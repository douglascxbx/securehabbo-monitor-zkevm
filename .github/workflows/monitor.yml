name: Monitor Listings

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel monitor
        env:
          MONITOR_URL: ${{ secrets.VERCEL_MONITOR_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$MONITOR_URL"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$MONITOR_URL"
